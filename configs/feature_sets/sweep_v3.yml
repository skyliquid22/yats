name: sweep_v3
description: >
  Stage 4a WFO sweep: sweep_v2 + 9 regime_v2 options-implied features (Stage 4a).
  Max lookback ~105 bars (inst_ownership_pct/inst_top10_share at ~105; regime_v2
  at 61). purge_buffer=105 keeps anchored-fold WFO feasible on the 502-bar span.
  This is the A/B sweep counterpart to sweep_v2 for the regime_v2 marginal-signal
  verdict (Stage 4b). Regime_v2 features require SPY EOD options chain
  (source_vendor=thetadata_eod).

