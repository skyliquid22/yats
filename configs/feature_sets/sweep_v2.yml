name: sweep_v2
description: >
  Stage 3d WFO sweep: sweep_v1 + 6 insider/institutional features (Stage 3c).
  Max lookback ~105 bars (inst_ownership_pct and inst_top10_share both at ~105;
  insider lookbacks are 30 and 90 — well within the 105-bar bound). purge_buffer=105
  keeps anchored-fold WFO feasible on the 502-bar span. This is the A/B sweep
  counterpart to sweep_v1 (max lookback=63) for the marginal-signal verdict.

