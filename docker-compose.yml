services:
  questdb:
    image: questdb/questdb:latest
    ports:
      - "9000:9000"   # HTTP / web console
      - "8812:8812"   # PG wire (psycopg2)
      - "9009:9009"   # ILP (questdb.ingress.Sender)
    volumes:
      - questdb_data:/root/.questdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/status"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

volumes:
  questdb_data:
